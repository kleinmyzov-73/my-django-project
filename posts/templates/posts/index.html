
<!doctype html>
<html lang="en">
  <head>
    <title>Blog Template for Bootstrap</title>
  <style>
    * {
  box-sizing: border-box;
}

body {
  font-family: "Lucida Sans", sans-serif;
  font-size: 17px;
}

.grid-container {
  display: grid;
  grid-template-areas:
  'header'
  'menu'
  'main'
  'facts'
  'footer';
  background-color: white;
  gap: 20px;
}

.header {
  grid-area: header;
  background-color: purple;
  text-align: center;
  color: #ffffff;
}

.header > h1 {
  font-size: 40px;
}

.menu {
  grid-area: menu;
}

.menu ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
}

.menu li {
  padding: 8px;
  margin-bottom: 7px;
  background-color: #33b5e5;
  color: #ffffff;
}

.menu li:hover {
  background-color: #0099cc;
}

.content {
  grid-area: main;
}

.content > h1 {
  font-size: 30px;
  margin-bottom: 7px;
}

.content > p {
  margin-bottom: 7px;
}

.facts {
  grid-area: facts;
  border: 1px solid #0099cc;
  background-color: beige;
  padding: 10px;
}

.facts > h2 {
  font-size: 20px;
}

.facts li {
  margin-bottom: 5px;
}

.footer {
  grid-area: footer;
  background-color: #0099cc;
  color: #ffffff;
  text-align: center;
}
</style>
</head>


  <body>
<div class="grid-container">
{%for posts in posst%}
<div class="header"><h1>{{posts.blog_title}}</h1></div>

<div class="content">
  <h1>{{posts.title}}</h1>
  <p>{{posts.body}}</p>
</div>
<hr>
<hr>
<div class="facts">
  <h2>{{posts.title}}</h2>
  <p>{{posts.body}}</p>
</div>


<div class="footer"><p>{{posts.created_at}}.</p></div>
{%endfor%}
</div>
  </body>
</html>
